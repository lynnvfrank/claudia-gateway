# Copy to `gateway.yaml` and edit. See docs/configuration.md.

gateway:
  semver: "0.1.0"
  listen_port: 3000
  listen_host: "0.0.0.0"
  log_level: "info"

upstream:
  # OpenAI-compatible upstream (BiFrost on the host).
  base_url: "http://127.0.0.1:8080"
  api_key_env: "CLAUDIA_UPSTREAM_API_KEY"
  # api_key: optional Bearer for upstream /v1/*. If omitted and api_key_env is unset/empty, a secret is generated and written here on first gateway start.

health:
  timeout_ms: 5000
  chat_timeout_ms: 300000

paths:
  tokens: "./tokens.yaml"
  routing_policy: "./routing-policy.yaml"
  provider_free_tier: "./provider-free-tier.yaml"
  # Vendor quota ceilings for admission/guards; see docs/version-v0.1.1.md §3.7.
  # Omitting the file entirely or shipping it empty means no enforcement.
  provider_model_limits: "./provider-model-limits.yaml"

routing:
  filter_free_tier_models: true
  fallback_chain:
    - "groq/llama-3.1-8b-instant"
    - "gemini/gemini-3-flash-preview"
  # Ordered list of upstream models used for the tool-router transformer (try in order; see docs/version-v0.1.1.md).
  # Leave empty to skip router calls. When non-empty, POST /v1/chat/completions may call the first working model
  # to score tools before the main upstream completion.
  router_models: []
  tool_router:
    enabled: true
    confidence_threshold: 0.5

# Gateway metrics (SQLite under ../data/gateway/ relative to this file; see docs/version-v0.1.1.md §3.6).
metrics:
  enabled: true
  # sqlite_path: "../data/gateway/metrics.sqlite"
  # migrations_dir: "../migrations/gateway"

# v0.2 Retrieval-Augmented Generation. When enabled, the virtual Claudia model
# performs Qdrant retrieval before chat; POST /v1/ingest, GET /v1/indexer/*,
# and the /health Qdrant probe are activated. See docs/version-v0.2.md.
rag:
  enabled: false
  qdrant:
    url: "http://127.0.0.1:6333"
    # api_key: "..."          # optional Qdrant API key
  embedding:
    # base_url defaults to upstream.base_url when empty.
    # base_url: ""
    path: "/v1/embeddings"
    model: "text-embedding-3-small"
    dim: 1536
  chunking:
    size: 512
    overlap: 128
  retrieval:
    top_k: 8
    score_threshold: 0.72
  ingest:
    max_bytes: 10485760       # 10 MiB; files larger are rejected (v0.4 streams)
  defaults:
    project_id: "default"
    flavor_id: ""
