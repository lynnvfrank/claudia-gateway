# Copy to `gateway.yaml` and edit. See docs/configuration.md.

gateway:
  semver: "0.1.0"
  listen_port: 3000
  listen_host: "0.0.0.0"
  log_level: "info"

litellm:
  # BiFrost (default stack): http://bifrost:8080 — LiteLLM: http://litellm:4000
  base_url: "http://bifrost:8080"
  api_key_env: "CLAUDIA_UPSTREAM_API_KEY"

health:
  timeout_ms: 5000
  chat_timeout_ms: 300000

paths:
  tokens: "./tokens.yaml"
  routing_policy: "./routing-policy.yaml"

routing:
  fallback_chain:
    - "groq/llama-3.1-8b-instant"
    - "gemini/gemini-3-flash-preview"
