# Main gateway process configuration (reload on mtime — touch to apply).

# Paths below are relative to this file’s directory unless absolute.

gateway:
  semver: "0.1.0"
  listen_port: 3000
  listen_host: "0.0.0.0"
  log_level: "info"
upstream:
  # OpenAI-compatible upstream root (BiFrost on loopback for local `claudia` / `claudia serve`).
  base_url: "http://127.0.0.1:8080"
  # Bearer sent on /v1/* to the upstream. BiFrost ignores this unless governance keys are enabled.

  # If `api_key` is omitted and CLAUDIA_UPSTREAM_API_KEY is unset, a random api_key is generated and written here on startup.
  api_key_env: "CLAUDIA_UPSTREAM_API_KEY"
  api_key: "7087a54b28809debc95dfb7f46ce580fa59db5b385c25d4ff18aaea7869c8af4"
health:
  # Defaults to {upstream.base_url}/health when omitted
  timeout_ms: 5000
  chat_timeout_ms: 300000
paths:
  tokens: "./tokens.yaml"
  routing_policy: "./routing-policy.yaml"
  provider_free_tier: "./provider-free-tier.yaml"
routing:
  # When true, merged GET /v1/models lists only ids allowed by provider-free-tier.yaml (intersected with upstream).
  filter_free_tier_models: true
  # When the routing policy is not able to determine a model, the fallback chain is used.

  fallback_chain:
    - "groq/llama-3.3-70b-versatile"
    - "groq/openai/gpt-oss-120b"
    - "groq/qwen/qwen3-32b"
    - "groq/meta-llama/llama-4-scout-17b-16e-instruct"
    - "groq/openai/gpt-oss-20b"
    - "groq/openai/gpt-oss-safeguard-20b"
    - "groq/llama-3.1-8b-instant"
    - "groq/allam-2-7b"
    - "groq/meta-llama/llama-prompt-guard-2-22m"
    - "groq/meta-llama/llama-prompt-guard-2-86m"
    - "gemini/gemini-2.5-pro"
    - "gemini/gemini-2.0-flash"
    - "gemini/gemini-2.5-flash"
    - "gemini/gemini-2.5-flash-native-audio-preview-12-2025"
    - "gemini/gemini-2.5-flash-preview-tts"
    - "gemini/gemini-3-flash-preview"
    - "gemini/gemini-3.1-flash-live-preview"
    - "groq/canopylabs/orpheus-arabic-saudi"
    - "groq/canopylabs/orpheus-v1-english"
    - "groq/groq/compound"
    - "groq/moonshotai/kimi-k2-instruct"
    - "groq/moonshotai/kimi-k2-instruct-0905"
    - "groq/whisper-large-v3"
    - "groq/whisper-large-v3-turbo"
    - "gemini/gemini-2.0-flash-lite"
    - "gemini/gemini-2.5-flash-lite"
    - "gemini/gemini-3.1-flash-lite-preview"
    - "gemini/gemini-embedding-001"
    - "gemini/gemini-embedding-2-preview"
    - "gemini/gemini-robotics-er-1.5-preview"
    - "groq/groq/compound-mini"
