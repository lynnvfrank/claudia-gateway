# Main gateway process configuration (reload on mtime — touch to apply).
# Paths below are relative to this file’s directory unless absolute.

gateway:
  semver: "0.1.0"
  listen_port: 3000
  listen_host: "0.0.0.0"
  log_level: "info"

upstream:
  # OpenAI-compatible upstream root (BiFrost on loopback for local `claudia` / `claudia serve`).
  base_url: "http://127.0.0.1:8080"
  # Bearer sent on /v1/* to the upstream. BiFrost ignores this unless governance keys are enabled; use any non-empty placeholder (see env.example / .env).
  api_key_env: "CLAUDIA_UPSTREAM_API_KEY"

health:
  # Defaults to {upstream.base_url}/health when omitted
  timeout_ms: 5000
  chat_timeout_ms: 300000

paths:
  tokens: "./tokens.yaml"
  routing_policy: "./routing-policy.yaml"

routing:
  # BiFrost unified model ids (provider/model). Align with config/bifrost.config.json providers.
  fallback_chain:
    - "groq/llama-3.1-8b-instant"
    - "gemini/gemini-3-flash-preview"
    - "groq/llama-3.3-70b-versatile"
    - "gemini/gemini-3.1-flash-lite-preview"
