# =============================================================================
# Routing policy — optional traffic shaping for the *virtual* Claudia model only
# =============================================================================
#
# When does this file apply?
#   Only when the client calls POST /v1/chat/completions with
#   "model": "Claudia-<semver>" (see gateway.semver in config/gateway.yaml).
#   Direct requests with a concrete upstream model id (e.g. groq/llama-3.1-8b-instant)
#   skip this file and are proxied as-is to the configured OpenAI-compatible upstream.
#
# How is it loaded?
#   Path: config/gateway.yaml → paths.routing_policy (default ./routing-policy.yaml).
#   The gateway reloads this file when its modification time changes (touch/save).
#
# What is a "turn"?
#   A turn is one chat completion request: a single POST /v1/chat/completions to
#   the gateway (e.g. one Continue send). For that request the gateway reads the
#   messages in the body, runs these rules once, picks an initial upstream model id,
#   and may walk the fallback chain during the same request if upstream errors are
#   retryable. In chat UIs, each user message usually triggers one such request, so
#   one conversational turn often lines up with one policy "turn" — but the file
#   means per HTTP request, not a line in YAML.
#
# What does it choose?
#   The *first* upstream model id to try for this turn. If the upstream returns a
#   retryable error (429, 500, 502, 503, 504), the gateway walks
#   routing.fallback_chain in config/gateway.yaml starting at the index of that
#   model — so your initial model should appear in the chain (see below).
#
# Prerequisite — ids must exist on the upstream:
#   With BiFrost, use unified ids such as groq/<model> or gemini/<model> (see
#   config/bifrost.config.json and provider docs). With LiteLLM, match model_name
#   entries in config/litellm_config.yaml. Typos or missing models produce upstream errors.
#
# Prerequisite — align with fallback_chain:
#   Put the same ids in routing.fallback_chain (config/gateway.yaml) in the order
#   you want fallbacks: e.g. fast Groq → OpenAI → local Ollama. The initial model
#   picked below should be one of those entries so retries continue down the chain
#   instead of restarting at the wrong tier.

# -----------------------------------------------------------------------------
# ambiguous_default_model (optional string)
# -----------------------------------------------------------------------------
# Used when: no rule in `rules` matches the current request (see rule matching).
# Set this to a stable, general-purpose upstream model id you always want as the
# safety net before falling back to the first entry of routing.fallback_chain.
# Leave empty "" only if you rely entirely on rules + fallback_chain[0].
#
# Example: prefer a hosted API you trust when rules do not apply.

ambiguous_default_model: "gemini/gemini-3.1-flash-lite-preview"

# -----------------------------------------------------------------------------
# rules (list, evaluated top to bottom)
# -----------------------------------------------------------------------------
# Matching: The gateway scans rules in order. The first rule that applies wins.
# For each rule:
#   - `when` (optional): conditions; see `when` below.
#   - `models` (required): NON-empty list. Only the FIRST item is used today
#     (see src/routing.ts pickInitialModel — rule.models[0]).
#     Extra entries are reserved for future use; keep one entry for clarity.
#   - `name` (optional): label for logs only.

rules:
  # --- Rule: long single user message ---
  # When the *last* user message in the chat is at least this many characters
  # (Unicode string length), this rule matches. Shorter user turns skip it.
  # Use this to route large pastes to a model with a bigger context window or
  # different pricing. Tune 8000 up/down to match your providers and habits.
  - name: long-user-turn
    when:
      min_message_chars: 8000
    models:
      - "groq/llama-3.3-70b-versatile"

  # --- Rule: default catch-all ---
  # when: {} means no extra conditions — if previous rules did not match, this one
  # always matches. Keep this block last so it acts as your “normal” path.
  - name: default
    when: {}
    models:
      # Fast default for typical short/medium chats (BiFrost unified id).
      - "groq/llama-3.1-8b-instant"
