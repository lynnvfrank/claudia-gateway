# =============================================================================
# Provider free-tier allowlist (operator-maintained)
# =============================================================================
#
# Purpose:
#   When routing.filter_free_tier_models is true in gateway.yaml, only model ids
#   that appear in BOTH this file (as an exact or pattern match) AND the live
#   upstream catalog are treated as eligible for merged model listing and for
#   automatic routing table generation.
#
# This file does not contact cloud providers. Keep entries aligned with the
# provider documentation for your account (free tier, trial, or paid).
#
# format_version (required, integer):
#   Bump when the structure of this file changes in a breaking way. The gateway
#   only accepts the version it was built for; today that is 1.
#
# effective_date (recommended, YYYY-MM-DD):
#   The calendar date when an operator last reviewed the allowlist against
#   provider pricing pages. Update this when you add or remove models so future
#   you knows how stale the list might be.
#
# models (optional, list of strings):
#   Full BiFrost unified ids exactly as returned by the upstream catalog
#   (e.g. groq/llama-3.1-8b-instant, gemini/gemini-2.0-flash).
#
# patterns (optional, list of strings):
#   Shell-style globs matched against the full id string. Use sparingly.
#   Example: gemini/gemini-2.0-flash* matches any catalog id with that prefix.
#   Metacharacters follow Go path.Match: * matches within one path segment
#   (characters other than /); use separate patterns for multiple segments.
#   Exception: a single-segment provider wildcard "provider/*" (no "/" before
#   the star) matches every upstream id under that provider, including nested
#   paths (e.g. ollama/* matches ollama/library/llama3).
#
# Empty models and patterns:
#   Valid but matches nothing — with the gateway filter enabled, upstream models
#   are hidden until you add entries.
#
# =============================================================================

format_version: 1
effective_date: "2026-04-12"
models:
