# Claudia Gateway stack (v0.1)
#
# Services:
#   - claudia: TypeScript gateway — IDE-facing OpenAI-compatible API, token auth,
#     virtual model Claudia-<semver>, routing policy + LiteLLM fallback chain.
#   - litellm: Official LiteLLM proxy — provider keys, upstream models; the gateway
#     calls it over Compose DNS at http://litellm:4000.
#   - qdrant: Vector DB — included for v0.2 RAG readiness; v0.1 gateway does not
#     probe or call Qdrant yet.
#
# Bootstrap: copy `env.example` to `.env`, set LITELLM_MASTER_KEY, Postgres vars,
# LITELLM_UI_*, at least one provider key; ensure `config/tokens.yaml` exists
# (see `config/tokens.example.yaml`), then: `docker compose up -d --build`.
#
# LiteLLM Admin UI (`/ui`) needs PostgreSQL: set DATABASE_URL via POSTGRES_* in `.env`.
# Without a DB, UI login often fails with “Invalid credentials” despite UI_USERNAME/UI_PASSWORD.
#
# Default URLs: gateway http://localhost:3000, LiteLLM http://localhost:4000,
# Qdrant http://localhost:6333.

services:
  claudia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudia
    ports:
      # Host:container — published gateway port for Continue / curl on the machine.
      - "3000:3000"
    environment:
      # Overrides gateway.yaml `gateway.log_level` when set (pino).
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Same name as `litellm.api_key_env` in gateway.yaml — sent upstream to LiteLLM.
      # Must match `.env` — see env.example (Compose substitutes empty string if unset).
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Optional explicit path inside the container (default /app/config/gateway.yaml via cwd).
      CLAUDIA_GATEWAY_CONFIG: /app/config/gateway.yaml
    volumes:
      # Host repo file → container — main gateway config (mtime reload for paths/chain/semver).
      - ./config/gateway.yaml:/app/config/gateway.yaml:ro
      # Gateway API tokens (mtime reload).
      - ./config/tokens.yaml:/app/config/tokens.yaml:ro
      # Routing policy YAML (mtime reload).
      - ./config/routing-policy.yaml:/app/config/routing-policy.yaml:ro
    networks:
      - claudianet
    depends_on:
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: litellm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - litellm_pg_data:/var/lib/postgresql/data
    networks:
      - claudianet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      # Published for host debugging / local `litellm` tools — not required for claudia (uses DNS).
      - "4000:4000"
    environment:
      # Required by LiteLLM proxy for admin/UI API auth; must match gateway LITELLM_MASTER_KEY.
      # Must match `.env` — see env.example (Compose substitutes empty string if unset).
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Admin UI + virtual keys: proxy connects to Postgres on first start (migrations).
      # URL must match `postgres` service credentials (see POSTGRES_* in `.env`).
      DATABASE_URL: postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@postgres:5432/${POSTGRES_DB:-litellm}
      # Referenced from config/litellm_config.yaml via os.environ/...
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Google AI Studio (Gemini API) key (API-key auth). Use `gemini/<model>` in LiteLLM configs
      # to force AI Studio routing; unprefixed Gemini model names may default to Vertex AI.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # UI Authentication Information
      UI_USERNAME: ${LITELLM_UI_USERNAME}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
    volumes:
      # Proxy model list and params — edit to add providers; host path is the source of truth.
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
    networks:
      - claudianet
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Proxy enforces API key on /health — reads LITELLM_MASTER_KEY from the container env.
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request as u;k=os.environ.get('LITELLM_MASTER_KEY','');r=u.Request('http://127.0.0.1:4000/health',headers={'Authorization':'Bearer '+k});u.urlopen(r,timeout=5)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      # Allow time for DB migrations on first boot.
      start_period: 90s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      # REST + dashboard; v0.1 gateway does not use Qdrant yet.
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Named volume — persistent vector data across container recreation.
      - qdrant_data:/qdrant/storage
    networks:
      - claudianet

networks:
  claudianet:
    driver: bridge

volumes:
  # Matches service name `qdrant` per plan — stores Qdrant on-disk storage.
  qdrant_data:
  # LiteLLM Proxy — Postgres data (UI users, virtual keys, spend).
  litellm_pg_data:
