<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Claudia — Logs</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0.75rem; background: #fff; color: #1a1a1a; min-height: 100vh; box-sizing: border-box; font-size: 0.85rem; }
    #toolbar { margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.75rem 1rem; flex-wrap: wrap; }
    #toolbar a { color: #0b57d0; }
    #toolbar .hint { font-size: 0.75rem; color: #555; }
    #filters-bar { margin-top: 0.85rem; margin-bottom: 1rem; padding-top: 0.65rem; border-top: 1px solid #ccc; display: flex; flex-wrap: wrap; align-items: center; gap: 0.65rem 1.25rem; }
    #filters-bar .filters-heading { font-size: 0.8rem; font-weight: 600; color: #444; margin-right: 0.25rem; }
    #filters { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem 1rem; }
    #filters label { display: flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; color: #333; }
    #filters select { background: #fff; color: #1a1a1a; border: 1px solid #ccc; border-radius: 4px; padding: 0.25rem 0.4rem; font-size: 0.8rem; }
    #status { font-size: 0.75rem; color: #555; }
    #status.err { color: #c00; }
    .table-wrap { overflow-x: auto; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
    #log-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: fixed; }
    /* Fixed outer column widths so the Details column keeps the same width regardless of which rows are currently visible (filter toggles). */
    #log-table col.outer-col-app { width: 10rem; }
    #log-table col.outer-col-dt { width: 12.5rem; }
    #log-table col.outer-col-dt-local { width: 12.5rem; }
    #log-table col.outer-col-lvl { width: 5.5rem; }
    #log-table col.outer-col-details { width: auto; }
    #log-table thead th { position: sticky; top: 0; z-index: 1; background: #e8e8e8; color: #222; text-align: left; font-weight: 600; padding: 0.45rem 0.5rem; border-bottom: 1px solid #bbb; white-space: nowrap; vertical-align: top; }
    #log-table tbody td { vertical-align: top; padding: 0.45rem 0.5rem; border-bottom: 1px solid #ddd; word-break: break-word; overflow-wrap: anywhere; }
    #log-table tbody tr:nth-child(odd) { background: #fff; }
    #log-table tbody tr:nth-child(even) { background: #f0f0f0; }
    #log-table tbody tr:hover { background: #e0e8f0; }
    .col-app { font-family: ui-monospace, monospace; color: #0b57d0; white-space: nowrap; font-size: 1rem; }
    /* Datetime cells must wrap: nowrap on the td is inherited and was overflowing into Level / adjacent cols. */
    .col-dt { font-family: ui-monospace, monospace; color: #5c4033; font-size: 1rem; white-space: normal; overflow-wrap: anywhere; word-break: break-word; }
    .col-dt-local { font-weight: 700; }
    .col-lvl { font-family: ui-monospace, monospace; white-space: nowrap; font-size: 1rem; overflow-wrap: normal; }
    .dt-stack { line-height: 1.45; white-space: normal; }
    .dt-stack .dt-line { display: block; white-space: normal; overflow-wrap: anywhere; word-break: break-word; }
    .dt-stack .dt-date { margin-top: 0.2rem; }
    .lvl-DEBUG { color: #666; }
    .lvl-INFO { color: #1b5e20; }
    .lvl-WARN { color: #b45309; }
    .lvl-ERROR { color: #b71c1c; }
    .lvl-TRACE { color: #666; }
    .lvl-none { color: #888; }
    .col-details { min-width: 24rem; }
    /* Inner "Details" table: every row uses the same 4-column key | value | key | value layout
       (with the second pair empty on odd rows) so the Details cell looks the same regardless of
       how many extras a row has and which filter is currently applied. */
    .props-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin: 0; table-layout: fixed; }
    .props-table col.col-k { width: 24%; }
    .props-table col.col-v { width: 26%; }
    .props-table td { border: 1px solid #ccc; padding: 0.25rem 0.45rem; vertical-align: top; }
    .props-table td:nth-child(3) { border-left: 2px solid #bbb; }
    .props-table .prop-name {
      font-family: ui-monospace, monospace; font-weight: 600; color: #0b57d0; background: #f4f6fa; text-align: left;
      box-sizing: border-box;
      overflow-wrap: anywhere; word-break: break-word;
    }
    .props-table .prop-val { color: #222; word-break: break-word; overflow-wrap: anywhere; white-space: pre-wrap; background: #fff; }
    .props-table .prop-empty { background: #fafafa; }
    .muted { color: #888; }
    #view-toolbar { display: flex; align-items: center; gap: 0.5rem 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; font-size: 0.8rem; }
    #view-toolbar label { display: flex; align-items: center; gap: 0.35rem; }
    #view-toolbar select { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 0.2rem 0.4rem; }
    .summary-headline { line-height: 1.5; margin-bottom: 0.35rem; }
    .summary-headline .path-em { font-weight: 700; color: #0b57d0; background: #f0f4ff; padding: 0.05rem 0.25rem; border-radius: 3px; }
    .pill-2xx, .pill-4xx, .pill-5xx { display: inline-block; font-weight: 700; font-size: 0.72rem; padding: 0.12rem 0.45rem; border-radius: 4px; margin-right: 0.35rem; }
    .pill-2xx { background: #e8f5e9; color: #1b5e20; }
    .pill-4xx { background: #fff8e1; color: #b45309; }
    .pill-5xx { background: #ffebee; color: #b71c1c; }
    .shape-badge { display: inline-block; font-size: 0.68rem; font-family: ui-monospace, monospace; background: #e8eaf6; color: #3949ab; padding: 0.08rem 0.35rem; border-radius: 3px; margin-right: 0.35rem; vertical-align: middle; }
    .story-panel { border: 1px solid #ccc; border-radius: 6px; padding: 0.65rem; margin-bottom: 0.75rem; background: #fafafa; max-height: 70vh; overflow-y: auto; }
    .story-panel h3 { margin: 0 0 0.5rem 0; font-size: 0.95rem; }
    .conv-card, .subsys-card { border: 1px solid #bbb; border-radius: 6px; padding: 0.5rem 0.65rem; margin: 0.5rem 0; background: #fff; }
    .conv-card.err-head { border-color: #c62828; background: #fff5f5; }
    .conv-card h4 { margin: 0 0 0.35rem 0; font-size: 0.85rem; }
    .conv-meta { font-size: 0.75rem; color: #555; margin-bottom: 0.35rem; }
    .story-events { font-size: 0.78rem; margin: 0; padding-left: 1.1rem; }
    .story-events li { margin: 0.2rem 0; cursor: pointer; }
    .err-badge { background: #c62828; color: #fff; font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 3px; margin-left: 0.35rem; }
    details.summary-details { margin-top: 0.35rem; font-size: 0.78rem; }
    details.summary-details summary { cursor: pointer; color: #0b57d0; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="toolbar-extra"></span>
    <span id="status">Starting…</span>
  </div>
  <div id="view-toolbar">
    <label>View
      <select id="view-mode" title="Log presentation mode">
        <option value="detailed">Detailed</option>
        <option value="summary">Summary</option>
        <option value="conversations">Conversations</option>
        <option value="subsystems">Subsystems</option>
      </select>
    </label>
    <span class="hint">Summary highlights path &amp; status. Conversations / Subsystems group by tags (<code>conversation_id</code>, <code>service</code>).</span>
  </div>
  <div id="panel-classic">
  <div class="table-wrap">
    <table id="log-table">
      <colgroup>
        <col class="outer-col-app" />
        <col class="outer-col-dt" />
        <col class="outer-col-dt-local" />
        <col class="outer-col-lvl" />
        <col class="outer-col-details" />
      </colgroup>
      <thead>
        <tr>
          <th scope="col">Application</th>
          <th scope="col">UTC</th>
          <th scope="col">Local</th>
          <th scope="col">Level</th>
          <th scope="col">Details</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
  </div>
  <div id="panel-conversations" class="story-panel" hidden></div>
  <div id="panel-subsystems" class="story-panel" hidden></div>
  <div id="filters-bar">
    <span class="filters-heading">Filters</span>
    <div id="filters">
      <label>Application
        <select id="flt-app" title="Filter by process / writer name">
          <option value="">All</option>
        </select>
      </label>
      <label>Level
        <select id="flt-level" title="Filter by log level when present">
          <option value="">All</option>
          <option value="(none)">(no level)</option>
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARN">WARN</option>
          <option value="ERROR">ERROR</option>
        </select>
      </label>
    </div>
  </div>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var embedded = params.get("embed") === "1" || window.self !== window.top;
  var tbody = document.getElementById("log-body");
  var statusEl = document.getElementById("status");
  var extra = document.getElementById("toolbar-extra");
  var fltApp = document.getElementById("flt-app");
  var fltLevel = document.getElementById("flt-level");
  viewMode = loadViewMode();
  viewModeEl = document.getElementById("view-mode");
  if (viewModeEl) {
    viewModeEl.value = viewMode;
    viewModeEl.addEventListener("change", function () {
      viewMode = viewModeEl.value || "detailed";
      saveViewMode(viewMode);
      applyViewLayout();
      rebuildAllRows();
    });
  }
  if (embedded) {
    extra.innerHTML = '<span class="hint">Embedded in desktop shell — switch views with the tabs above.</span>';
  } else {
    extra.innerHTML = '<a href="/ui/desktop" target="_top">Desktop shell</a> · <a href="/ui/panel" target="_top">Admin</a>';
  }

  var maxSeq = 0;
  var stickPx = 160;
  var es = null;
  var pollTimer = null;
  var started = false;
  var levelOptionSet = { "": true, "(none)": true, DEBUG: true, INFO: true, WARN: true, ERROR: true };
  var VIEW_LS = "claudia_logs_view_mode";
  var entryCache = [];
  var viewMode = "detailed";
  var viewModeEl = null;
  var storyRebuildTimer = null;

  function loadViewMode() {
    try {
      var v = localStorage.getItem(VIEW_LS);
      if (v === "summary" || v === "detailed" || v === "conversations" || v === "subsystems") return v;
    } catch (x) {}
    return "detailed";
  }
  function saveViewMode(v) {
    try {
      localStorage.setItem(VIEW_LS, v);
    } catch (x) {}
  }

  function inferShape(flat, source, rawText) {
    if (!flat) {
      if (source === "qdrant" || source === "bifrost" || source === "indexer") return "service." + source;
      return "generic";
    }
    var msg = String(flat.msg != null ? flat.msg : flat.message != null ? flat.message : "").toLowerCase();
    if (msg === "http response" || (flat.method && flat.path != null && flat.statusCode !== undefined && flat.statusCode !== null))
      return "http.access";
    if (msg === "chat.request") return "chat.request";
    if (msg.indexOf("chat.bifrost") === 0 || msg.indexOf("upstream chat") >= 0) return "chat.bifrost";
    if (msg.indexOf("rag.") === 0) return "rag";
    if (msg === "ingest.complete" || (msg.indexOf("ingest") === 0 && msg !== "ingest complete")) return "ingest";
    if (msg.indexOf("indexer.run") === 0) return "indexer.run";
    if (flat.service && String(flat.service) !== "gateway") return "service." + flat.service;
    if (source === "qdrant" || source === "bifrost" || source === "indexer") return "service." + source;
    return "generic";
  }

  function statusPillClass(code) {
    var sc = Number(code);
    if (isNaN(sc)) return "pill-4xx";
    if (sc >= 500) return "pill-5xx";
    if (sc >= 400) return "pill-4xx";
    return "pill-2xx";
  }

  function buildHeadlineHtml(flat, shape) {
    if (!flat) return '<span class="muted">—</span>';
    if (shape === "http.access") {
      var sc = flat.statusCode;
      var auth = flat.authorization ? ' <span class="muted">' + escapeHtml(String(flat.authorization)) + "</span>" : "";
      return (
        '<div class="summary-headline"><span class="' +
        statusPillClass(sc) +
        '">' +
        escapeHtml(String(sc)) +
        "</span> <strong>" +
        escapeHtml(String(flat.method || "")) +
        '</strong> <code class="path-em">' +
        escapeHtml(String(flat.path || "")) +
        '</code> <span class="muted">' +
        (flat.responseTimeMs != null ? escapeHtml(String(flat.responseTimeMs)) + " ms" : "") +
        "</span>" +
        auth +
        "</div>"
      );
    }
    var m = flat.msg != null ? flat.msg : flat.message != null ? flat.message : "";
    var one = [m && String(m), flat.upstreamModel && ("model " + flat.upstreamModel), flat.source && ("source " + flat.source)]
      .filter(Boolean)
      .join(" · ");
    if (!one) one = shape;
    return '<div class="summary-headline">' + escapeHtml(one) + "</div>";
  }

  var headlineKeys = {
    "http.access": { method: true, path: true, statusCode: true, responseTimeMs: true, authorization: true, msg: true, message: true }
  };

  function filterExtrasForSummary(shape, extras, flat) {
    var drop = headlineKeys[shape] || null;
    if (!drop) return extras;
    var out = [];
    for (var i = 0; i < extras.length; i++) {
      if (drop[extras[i].k]) continue;
      out.push(extras[i]);
    }
    return out;
  }

  function buildDetailsColumn(parsed) {
    if (viewMode === "detailed") {
      return buildDetailsCell(parsed.extras);
    }
    var shapeLabel = parsed.shape || "generic";
    var head = '<span class="shape-badge">' + escapeHtml(shapeLabel) + "</span>" + buildHeadlineHtml(parsed.rawFlat, shapeLabel);
    var filt = filterExtrasForSummary(shapeLabel, parsed.extras, parsed.rawFlat);
    var inner = buildDetailsCell(filt.length ? filt : [{ k: "_", v: "—" }]);
    return head + '<details class="summary-details"><summary>All fields</summary>' + inner + "</details>";
  }

  function nearBottom() {
    var el = document.documentElement;
    var sh = el.scrollHeight;
    var y = window.scrollY + window.innerHeight;
    return sh - y <= stickPx;
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return "";
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  function formatHumanDateTimeUTC(tsOrDate) {
    if (tsOrDate === null || tsOrDate === undefined || tsOrDate === "") return "";
    var d = tsOrDate instanceof Date ? tsOrDate : new Date(tsOrDate);
    if (isNaN(d.getTime())) return String(tsOrDate).replace("T", " ");
    try {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: "UTC",
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      }).format(d) + " UTC";
    } catch (err) {
      return d.toUTCString();
    }
  }

  function formatStackedDateTimeCell(d, timeZone) {
    var optsTime = {
      hour: "numeric",
      minute: "2-digit",
      second: "2-digit",
      hour12: true
    };
    var optsDate = {
      weekday: "short",
      month: "short",
      day: "numeric",
      year: "numeric"
    };
    if (timeZone) {
      optsTime.timeZone = timeZone;
      optsDate.timeZone = timeZone;
    }
    var timeStr = new Intl.DateTimeFormat("en-US", optsTime).format(d);
    var dateStr = new Intl.DateTimeFormat("en-US", optsDate).format(d);
    return (
      '<div class="dt-stack">' +
      '<span class="dt-line dt-time">' +
      escapeHtml(timeStr) +
      "</span>" +
      '<span class="dt-line dt-date">' +
      escapeHtml(dateStr) +
      "</span></div>"
    );
  }

  function buildDateTimeCells(instant, entryTS) {
    if (instant && !isNaN(instant.getTime())) {
      return {
        utc: formatStackedDateTimeCell(instant, "UTC"),
        local: formatStackedDateTimeCell(instant, undefined)
      };
    }
    var raw = "";
    if (entryTS !== null && entryTS !== undefined && entryTS !== "") {
      raw = formatHumanDateTimeUTC(entryTS);
    }
    if (!raw) {
      var dash = '<div class="dt-stack"><span class="dt-line muted">—</span></div>';
      return { utc: dash, local: dash };
    }
    return {
      utc:
        '<div class="dt-stack dt-fallback"><span class="dt-line dt-time">' +
        escapeHtml(raw) +
        "</span></div>",
      local: '<div class="dt-stack"><span class="dt-line muted">—</span></div>'
    };
  }

  function parseKeyValueLine(line) {
    var out = {};
    var i = 0;
    var len = line.length;
    while (i < len) {
      while (i < len && line[i] === " ") i++;
      if (i >= len) break;
      var eq = line.indexOf("=", i);
      if (eq < 0) break;
      var key = line.slice(i, eq);
      if (!key) break;
      i = eq + 1;
      var val = "";
      if (i < len && line[i] === "\"") {
        i++;
        while (i < len) {
          if (line[i] === "\\") {
            i++;
            if (i < len) val += line[i++];
            continue;
          }
          if (line[i] === "\"") {
            i++;
            break;
          }
          val += line[i++];
        }
      } else {
        while (i < len && line[i] !== " ") val += line[i++];
      }
      out[key] = val;
    }
    return out;
  }

  function tryParseJSONObject(text) {
    var t = text.trim();
    if (!t || t[0] !== "{") return null;
    try {
      return JSON.parse(t);
    } catch (x) {
      return null;
    }
  }

  function flattenObject(obj, prefix, acc) {
    acc = acc || {};
    if (obj === null || obj === undefined) return acc;
    if (typeof obj !== "object" || Array.isArray(obj)) {
      acc[prefix || "_"] = obj;
      return acc;
    }
    var keys = Object.keys(obj);
    if (keys.length === 0) {
      acc[prefix || "empty"] = {};
      return acc;
    }
    for (var k = 0; k < keys.length; k++) {
      var key = keys[k];
      var path = prefix ? prefix + "." + key : key;
      var v = obj[key];
      if (v !== null && typeof v === "object" && !Array.isArray(v)) {
        flattenObject(v, path, acc);
      } else {
        acc[path] = v;
      }
    }
    return acc;
  }

  function formatExtraValue(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "string") return v;
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    try {
      return JSON.stringify(v);
    } catch (x) {
      return String(v);
    }
  }

  var reservedForColumns = { time: true, ts: true, timestamp: true, "@timestamp": true, level: true };

  function canonicalLevel(raw) {
    if (raw === null || raw === undefined) return null;
    var s0 = String(raw).trim();
    if (s0 === "") return null;
    var n = parseInt(s0, 10);
    /* Go slog JSON uses small integers (-8 TRACE, -4 DEBUG … 8 ERROR). Skip larger ints (e.g. Zap). */
    if (!isNaN(n) && String(n) === s0 && n >= -8 && n <= 12) {
      if (n <= -5) return "TRACE";
      if (n <= -1) return "DEBUG";
      if (n < 4) return "INFO";
      if (n < 8) return "WARN";
      return "ERROR";
    }
    var s = s0.toUpperCase();
    if (s === "WARNING") return "WARN";
    if (s === "ERR") return "ERROR";
    if (s === "DEBUG" || s === "INFO" || s === "WARN" || s === "ERROR" || s === "TRACE" || s === "FATAL") {
      if (s === "FATAL") return "ERROR";
      return s;
    }
    return s0;
  }

  function displayLevelLabel(can) {
    if (!can) return "—";
    return can;
  }

  function sortExtraKeys(keys) {
    var pri = ["msg", "message", "status", "err", "error", "code", "path", "method"];
    keys.sort(function (a, b) {
      var la = a.toLowerCase();
      var lb = b.toLowerCase();
      var ia = -1, ib = -1;
      for (var p = 0; p < pri.length; p++) {
        if (ia < 0 && la === pri[p]) ia = p;
        if (ib < 0 && lb === pri[p]) ib = p;
      }
      if (ia >= 0 && ib >= 0) return ia - ib;
      if (ia >= 0) return -1;
      if (ib >= 0) return 1;
      return a.localeCompare(b);
    });
  }

  function parseLogText(source, text, entryTS) {
    var flat = null;
    var fromJSON = tryParseJSONObject(text);
    if (fromJSON && typeof fromJSON === "object" && !Array.isArray(fromJSON)) {
      flat = flattenObject(fromJSON, "", {});
    } else {
      var kv = parseKeyValueLine(text);
      if (Object.keys(kv).length && (kv.time !== undefined || kv.level !== undefined)) {
        flat = kv;
      }
    }

    var instant = null;
    if (entryTS !== null && entryTS !== undefined && entryTS !== "") {
      var d0 = entryTS instanceof Date ? entryTS : new Date(entryTS);
      if (!isNaN(d0.getTime())) instant = d0;
    }
    var levelCanon = null;
    var extras = [];

    if (flat) {
      var tRaw = "";
      if (flat.time !== undefined && flat.time !== null && flat.time !== "") tRaw = flat.time;
      else if (flat.ts !== undefined && flat.ts !== null && flat.ts !== "") tRaw = flat.ts;
      else if (flat.timestamp !== undefined && flat.timestamp !== null && flat.timestamp !== "") tRaw = flat.timestamp;
      else if (flat["@timestamp"] !== undefined && flat["@timestamp"] !== null && flat["@timestamp"] !== "") tRaw = flat["@timestamp"];
      if (tRaw !== "" && tRaw !== undefined && tRaw !== null) {
        var tryDt = new Date(String(tRaw));
        if (!isNaN(tryDt.getTime())) instant = tryDt;
      }
      if (flat.level !== undefined && flat.level !== null && flat.level !== "") {
        levelCanon = canonicalLevel(flat.level);
      }
      var keys = Object.keys(flat);
      sortExtraKeys(keys);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var lk = k.toLowerCase();
        if (reservedForColumns[lk]) continue;
        if (lk === "time" || lk === "timestamp" || lk === "@timestamp") continue;
        extras.push({ k: k, v: formatExtraValue(flat[k]) });
      }
    } else {
      extras.push({ k: "text", v: text });
    }

    var dtCells = buildDateTimeCells(instant, entryTS);
    var rawFlat = null;
    if (flat) {
      rawFlat = {};
      for (var rk in flat) {
        if (Object.prototype.hasOwnProperty.call(flat, rk)) rawFlat[rk] = flat[rk];
      }
    }
    var shape = inferShape(rawFlat, source, text || "");
    return {
      app: source || "—",
      dtUtcHtml: dtCells.utc,
      dtLocalHtml: dtCells.local,
      levelCanon: levelCanon,
      levelLabel: displayLevelLabel(levelCanon),
      extras: extras,
      rawFlat: rawFlat,
      shape: shape
    };
  }

  function ensureAppOption(app) {
    if (!app) return;
    for (var i = 0; i < fltApp.options.length; i++) {
      if (fltApp.options[i].value === app) return;
    }
    var opt = document.createElement("option");
    opt.value = app;
    opt.textContent = app;
    fltApp.appendChild(opt);
  }

  function ensureLevelOption(lvl) {
    if (!lvl) return;
    if (levelOptionSet[lvl]) return;
    levelOptionSet[lvl] = true;
    var opt = document.createElement("option");
    opt.value = lvl;
    opt.textContent = lvl;
    fltLevel.appendChild(opt);
  }

  function rowMatchesFilter(tr) {
    var fa = fltApp.value;
    var fl = fltLevel.value;
    if (fa && tr.dataset.app !== fa) return false;
    if (!fl) return true;
    if (fl === "(none)") return !tr.dataset.level || tr.dataset.level === "";
    return tr.dataset.level === fl;
  }

  function applyFilters() {
    // tbody.rows = log rows only; querySelectorAll("tr") also matched inner details <tr>s.
    var rows = tbody.rows;
    for (var i = 0; i < rows.length; i++) {
      rows[i].style.display = rowMatchesFilter(rows[i]) ? "" : "none";
    }
  }

  fltApp.addEventListener("change", applyFilters);
  fltLevel.addEventListener("change", applyFilters);

  function applyViewLayout() {
    var classic = document.getElementById("panel-classic");
    var pc = document.getElementById("panel-conversations");
    var ps = document.getElementById("panel-subsystems");
    if (!classic || !pc || !ps) return;
    if (viewMode === "conversations") {
      classic.hidden = true;
      pc.hidden = false;
      ps.hidden = true;
    } else if (viewMode === "subsystems") {
      classic.hidden = true;
      pc.hidden = true;
      ps.hidden = false;
    } else {
      classic.hidden = false;
      pc.hidden = true;
      ps.hidden = true;
    }
  }

  function getFlat(parsed) {
    return parsed.rawFlat || {};
  }

  function rebuildAllRows() {
    tbody.innerHTML = "";
    fltApp.innerHTML = '<option value="">All</option>';
    levelOptionSet = { "": true, "(none)": true, DEBUG: true, INFO: true, WARN: true, ERROR: true };
    for (var i = 0; i < entryCache.length; i++) {
      var parsed = entryCache[i].parsed;
      ensureAppOption(parsed.app);
      if (parsed.levelCanon) ensureLevelOption(parsed.levelCanon);
      if (viewMode !== "conversations" && viewMode !== "subsystems") {
        appendTableRow(parsed, false);
      }
    }
    if (viewMode === "conversations" || viewMode === "subsystems") refreshStoryPanels();
    applyFilters();
  }

  function refreshStoryPanels() {
    var pc = document.getElementById("panel-conversations");
    var ps = document.getElementById("panel-subsystems");
    if (!pc || !ps) return;
    if (viewMode === "conversations") pc.innerHTML = renderConversations();
    if (viewMode === "subsystems") ps.innerHTML = renderSubsystems();
  }

  function scheduleStoryRebuild() {
    if (storyRebuildTimer) clearTimeout(storyRebuildTimer);
    storyRebuildTimer = setTimeout(function () {
      storyRebuildTimer = null;
      refreshStoryPanels();
    }, 80);
  }

  function renderConversations() {
    var groups = {};
    for (var i = 0; i < entryCache.length; i++) {
      var p = entryCache[i].parsed;
      var f = getFlat(p);
      var cid = f.conversation_id ? String(f.conversation_id) : "";
      if (!cid) continue;
      var pid = f.principal_id ? String(f.principal_id) : f.tenant ? String(f.tenant) : "";
      if (!pid) pid = "(unknown principal)";
      var key = pid + "\0" + cid;
      if (!groups[key]) {
        groups[key] = { pid: pid, cid: cid, events: [], err: 0 };
      }
      var g = groups[key];
      var lvl = p.levelCanon || "";
      if (lvl === "ERROR" || lvl === "WARN") g.err++;
      var sc = Number(f.statusCode);
      if (!isNaN(sc) && sc >= 400) g.err++;
      g.events.push({ parsed: p, text: entryCache[i].text || "" });
    }
    var keys = Object.keys(groups);
    if (!keys.length) {
      return '<p class="muted">No <code>conversation_id</code> yet. Traffic from <code>POST /v1/chat/completions</code> after gateway Phase B will appear here.</p>';
    }
    keys.sort();
    var html = "<h3>By principal · conversation</h3>";
    for (var j = 0; j < keys.length; j++) {
      var g = groups[keys[j]];
      var errClass = g.err > 0 ? "conv-card err-head" : "conv-card";
      var show = g.events.slice(-5);
      var hidden = g.events.length - show.length;
      var evHtml = "<ul class=\"story-events\">";
      for (var k = 0; k < show.length; k++) {
        var ev = show[k];
        var rf = getFlat(ev.parsed);
        var one = (rf.msg && String(rf.msg)) || (ev.text || "").slice(0, 140);
        evHtml += "<li>" + escapeHtml(one) + "</li>";
      }
      evHtml += "</ul>";
      var more =
        hidden > 0
          ? '<p class="muted">' + hidden + " earlier events in buffer — switch to <strong>Detailed</strong> for the full table.</p>"
          : "";
      html +=
        "<div class=\"" +
        errClass +
        '"><h4>' +
        escapeHtml(g.pid) +
        ' <span class="muted">·</span> <code>' +
        escapeHtml(g.cid) +
        "</code>" +
        (g.err ? '<span class="err-badge">' + g.err + " issues</span>" : "") +
        "</h4><div class=\"conv-meta\">Events: " +
        g.events.length +
        "</div>" +
        evHtml +
        more +
        "</div>";
    }
    return html;
  }

  function renderSubsystems() {
    var buckets = { gateway: [], qdrant: [], bifrost: [], indexer: [] };
    for (var i = 0; i < entryCache.length; i++) {
      var ent = entryCache[i];
      var p = ent.parsed;
      var f = getFlat(p);
      var svc = f.service ? String(f.service) : "";
      if (!buckets[svc]) {
        svc = ent.source || "gateway";
        if (!buckets[svc]) svc = "gateway";
      }
      buckets[svc].push(ent);
    }
    var order = ["gateway", "qdrant", "bifrost", "indexer"];
    var html = "<h3>Subsystem activity</h3>";
    for (var j = 0; j < order.length; j++) {
      var name = order[j];
      var arr = buckets[name];
      var err = 0;
      for (var k = 0; k < arr.length; k++) {
        var p = arr[k].parsed;
        if (p.levelCanon === "ERROR" || p.levelCanon === "WARN") err++;
        var sc = Number(getFlat(p).statusCode);
        if (!isNaN(sc) && sc >= 400) err++;
      }
      var last = arr.length ? arr[arr.length - 1] : null;
      var lastMsg = "";
      if (last) {
        var rf = getFlat(last.parsed);
        lastMsg = (rf.msg && String(rf.msg)) || (last.text || "").slice(0, 120);
      }
      var cardClass = err > 0 ? "subsys-card err-head" : "subsys-card";
      var show = arr.slice(-8);
      var lines = "";
      for (var m = 0; m < show.length; m++) {
        var p2 = show[m].parsed;
        var f2 = getFlat(p2);
        var line = (f2.msg && String(f2.msg)) || (show[m].text || "").slice(0, 120);
        lines += "<li>" + escapeHtml(line) + "</li>";
      }
      html +=
        "<div class=\"" +
        cardClass +
        '"><h4>' +
        escapeHtml(name) +
        (err ? '<span class="err-badge">' + err + "</span>" : "") +
        "</h4><div class=\"conv-meta\">Events: " +
        arr.length +
        "</div><p class=\"conv-meta\">Last: " +
        escapeHtml(lastMsg) +
        '</p><ul class="story-events">' +
        lines +
        "</ul></div>";
    }
    return html;
  }

  function appendTableRow(parsed, follow) {
    var tr = document.createElement("tr");
    tr.dataset.app = parsed.app;
    tr.dataset.level = parsed.levelCanon || "";
    var lvlClass = "lvl-none";
    if (parsed.levelCanon) {
      var safe = String(parsed.levelCanon).replace(/[^A-Z0-9_-]/gi, "");
      if (safe) lvlClass = "lvl-" + safe;
    }
    tr.innerHTML =
      '<td class="col-app">' +
      escapeHtml(parsed.app) +
      "</td>" +
      '<td class="col-dt col-dt-utc">' +
      parsed.dtUtcHtml +
      "</td>" +
      '<td class="col-dt col-dt-local">' +
      parsed.dtLocalHtml +
      "</td>" +
      '<td class="col-lvl ' +
      lvlClass +
      '">' +
      escapeHtml(parsed.levelLabel) +
      "</td>" +
      '<td class="col-details">' +
      buildDetailsColumn(parsed) +
      "</td>";
    if (!rowMatchesFilter(tr)) tr.style.display = "none";
    tbody.appendChild(tr);
    while (tbody.children.length > 5000) {
      var first = tbody.firstChild;
      var removedH = first.offsetHeight;
      tbody.removeChild(first);
      if (!follow && removedH) {
        window.scrollTo(0, Math.max(0, window.scrollY - removedH));
      }
    }
    if (follow) {
      window.scrollTo(0, document.documentElement.scrollHeight);
    }
  }

  function buildDetailsCell(extras) {
    if (!extras.length) return '<span class="muted">—</span>';
    // Use a 4-column grid (key | value | key | value) so multi-field structured logs stay dense.
    // When a row only has one pair (either the single-extra case, e.g. a plain-text line captured
    // as text=<line>, or the trailing odd pair of a multi-extra log), expand that value across the
    // remaining 3 columns so it gets the full Details width. Keeps the outer column geometry
    // stable across filter toggles while never cramping solo values into 26%.
    var s = '<table class="props-table"><colgroup>' +
      '<col class="col-k" /><col class="col-v" /><col class="col-k" /><col class="col-v" />' +
      "</colgroup><tbody>";
    for (var i = 0; i < extras.length; i += 2) {
      s += "<tr>";
      s += '<td class="prop-name">' + escapeHtml(extras[i].k) + "</td>";
      if (i + 1 < extras.length) {
        s += '<td class="prop-val">' + escapeHtml(extras[i].v) + "</td>";
        s += '<td class="prop-name">' + escapeHtml(extras[i + 1].k) + "</td>";
        s += '<td class="prop-val">' + escapeHtml(extras[i + 1].v) + "</td>";
      } else {
        s += '<td class="prop-val prop-val-wide" colspan="3">' + escapeHtml(extras[i].v) + "</td>";
      }
      s += "</tr>";
    }
    s += "</tbody></table>";
    return s;
  }

  function appendLine(e) {
    if (e.seq <= maxSeq) return;
    maxSeq = e.seq;
    var follow = nearBottom();
    var parsed = parseLogText(e.source, e.text || "", e.ts);
    entryCache.push({
      seq: e.seq,
      source: e.source,
      text: e.text || "",
      ts: e.ts,
      parsed: parsed
    });
    while (entryCache.length > 5000) entryCache.shift();

    if (viewMode === "conversations" || viewMode === "subsystems") {
      scheduleStoryRebuild();
      if (follow) window.scrollTo(0, document.documentElement.scrollHeight);
      return;
    }
    ensureAppOption(parsed.app);
    if (parsed.levelCanon) ensureLevelOption(parsed.levelCanon);
    appendTableRow(parsed, follow);
  }

  function applyPollPayload(data) {
    var lines = data.lines || [];
    for (var i = 0; i < lines.length; i++) {
      appendLine(lines[i]);
    }
    return data.max_seq || maxSeq;
  }

  function pollOnce() {
    fetch("/api/ui/logs?since=" + maxSeq, { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayload(data);
        statusEl.textContent = "Live (poll)";
        statusEl.className = "";
      })
      .catch(function () {
        statusEl.textContent = "Log API error — check session";
        statusEl.className = "err";
      });
  }

  function startPolling() {
    if (pollTimer) return;
    if (es) {
      try { es.close(); } catch (x) {}
      es = null;
    }
    pollOnce();
    pollTimer = setInterval(pollOnce, 1500);
  }

  function startEventSource() {
    if (es) return;
    var url = "/api/ui/logs/stream";
    try {
      es = new EventSource(url, { withCredentials: true });
    } catch (x) {
      es = new EventSource(url);
    }
    var sseFailed = window.setTimeout(function () {
      if (statusEl.textContent.indexOf("Live") === -1) {
        startPolling();
      }
    }, 2500);
    es.onopen = function () {
      window.clearTimeout(sseFailed);
      statusEl.textContent = "Live (SSE)";
      statusEl.className = "";
    };
    es.onerror = function () {
      window.clearTimeout(sseFailed);
      if (es && es.readyState === EventSource.CLOSED) {
        startPolling();
      } else {
        statusEl.textContent = "SSE reconnecting…";
        statusEl.className = "err";
        window.setTimeout(function () {
          if (es && es.readyState !== EventSource.OPEN) {
            startPolling();
          }
        }, 2000);
      }
    };
    es.onmessage = function (ev) {
      try {
        var row = JSON.parse(ev.data);
        appendLine(row);
      } catch (x) {
        statusEl.textContent = "Bad frame";
        statusEl.className = "err";
      }
    };
  }

  function startStreaming() {
    if (started) return;
    started = true;
    statusEl.textContent = "Loading history…";
    fetch("/api/ui/logs?since=0", { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayload(data);
        startEventSource();
      })
      .catch(function () {
        statusEl.textContent = "Unauthorized — sign in from the shell";
        statusEl.className = "err";
      });
  }

  if (embedded) {
    window.addEventListener("message", function (ev) {
      if (ev.origin !== window.location.origin) return;
      var d = ev.data;
      if (d && d.type === "claudia-logs-activate") {
        startStreaming();
      }
    });
    statusEl.textContent = "Open the Logs tab…";
    setTimeout(function () {
      if (!started) startStreaming();
    }, 4000);
  } else {
    startStreaming();
  }
  applyViewLayout();
})();
  </script>
</body>
</html>
