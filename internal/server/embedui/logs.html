  /** Gateway logs upstream relay with service=gateway; bucket those lines under bifrost so the card updates with chat traffic. */
  function entryIsGatewayUpstreamRelay(ent) {
    var f = getFlat(ent.parsed);
    var msg = String(f.msg != null ? f.msg : f.message != null ? f.message : "").trim();
    if (
      msg === "chat.bifrost.request" ||
      msg === "upstream chat response" ||
      msg === "chat.bifrost.error" ||
      msg.indexOf("bifrost.error") >= 0
    ) {
      return true;
    }
    var sh = ent.parsed.shape || "";
    if (sh === "chat.bifrost" || sh.indexOf("chat.bifrost.") === 0) return true;
    return false;
  }

  function renderSummarizedUnified() {
    var groups = {};
    for (var i = 0; i < entryCache.length; i++) {
      var ent = entryCache[i];
      var p = ent.parsed;
      var f = getFlat(p);
      var cid = f.conversation_id ? String(f.conversation_id) : "";
      if (!cid) continue;
      var pid = f.principal_id ? String(f.principal_id) : f.tenant ? String(f.tenant) : "";
      if (!pid) pid = "(unknown principal)";
      var key = pid + "\0" + cid;
      if (!groups[key]) groups[key] = { pid: pid, cid: cid, events: [] };
      var g = groups[key];
      g.events.push({ parsed: p, text: ent.text || "", ts: ent.ts, seq: ent.seq });
    }
    var buckets = { gateway: [], qdrant: [], bifrost: [], indexer: [] };
    for (var bi = 0; bi < entryCache.length; bi++) {
      var entB = entryCache[bi];
      var pB = entB.parsed;
      var fB = getFlat(pB);
      var svc = fB.service ? String(fB.service) : "";
      if (entryIsGatewayUpstreamRelay(entB)) svc = "bifrost";
      else if (!buckets[svc]) {
        svc = entB.source || "gateway";
        if (!buckets[svc]) svc = "gateway";
      }
      buckets[svc].push(entB);
    }
    var byRun = {};
    for (var ri = 0; ri < entryCache.length; ri++) {
      var entR = entryCache[ri];
      var fR = getFlat(entR.parsed);
      var rid = fR.index_run_id != null && fR.index_run_id !== "" ? String(fR.index_run_id) : "";
      if (!rid) continue;
      if (!byRun[rid]) byRun[rid] = { id: rid, events: [] };
      byRun[rid].events.push(entR);
    }
    var convClusterGapMs = 42 * 60 * 1000;
    var mergedConv = clusterConversationGroupsByTime(groups, convClusterGapMs);
    var convTimeline = [];
    for (var ci = 0; ci < mergedConv.length; ci++) {
      var gx = mergedConv[ci];
      convTimeline.push({ sort: convLastTs(gx), html: buildConvCard(gx) });
    }
    convTimeline.sort(function (a, b) {
      return b.sort - a.sort;
    });
    var svcHtml = "";
    var order = ["bifrost", "gateway", "indexer", "qdrant"];
    for (var oi = 0; oi < order.length; oi++) {
      var nm = order[oi];
      var arr = buckets[nm];
      if (!arr || !arr.length) continue;
      svcHtml += buildServiceCard(nm, arr);
    }
    var idxTimeline = [];
    var rks = Object.keys(byRun);
    for (var rj = 0; rj < rks.length; rj++) {
      var run = byRun[rks[rj]];
      var mx = 0;
      for (var ue = 0; ue < run.events.length; ue++) {
        var tt = entryInstant(run.events[ue]);
        if (tt) mx = Math.max(mx, tt.getTime());
      }
      idxTimeline.push({ sort: mx, html: buildIndexerCard(run) });
    }
    idxTimeline.sort(function (a, b) {
      return b.sort - a.sort;
    });
    var body = buildGatewayUsageFeedSection();
    if (convTimeline.length) {
      body +=
        '<div class="sum-feed-section"><div class="sum-section-label sum-feed-section-title">Conversations</div>';
      for (var zc = 0; zc < convTimeline.length; zc++) body += convTimeline[zc].html;
      body += "</div>";
    }
    if (idxTimeline.length) {
      body +=
        '<div class="sum-feed-section"><div class="sum-section-label sum-feed-section-title">Indexer runs</div>';
      for (var zi = 0; zi < idxTimeline.length; zi++) body += idxTimeline[zi].html;
      body += "</div>";
    }
    if (svcHtml) {
      body +=
        '<div class="sum-feed-section"><div class="sum-section-label sum-feed-section-title">Services</div>' +
        svcHtml +
        "</div>";
    }
    var hasThreads = convTimeline.length > 0 || idxTimeline.length > 0 || svcHtml.length > 0;
    if (!hasThreads) {
      body +=
        '<p class="muted">No grouped threads in the buffer yet. Use the gateway chat path (conversation tags), indexer runs, or supervised services to populate cards; switch to <strong>StructuredLogs</strong> for the live stream.</p>';
    }
    return body;
  }
  function appendTableRow(parsed, follow, seq, entryTs, rawText) {
    var tr = document.createElement("tr");
    tr.dataset.app = parsed.app;
    tr.dataset.level = parsed.levelCanon || "";

  function buildDetailsCell(extras) {
    if (!extras.length) return '<span class="muted">—</span>';
    // Use a 4-column grid (key | value | key | value) so multi-field structured logs stay dense.
    // When a row only has one pair (either the single-extra case, e.g. a plain-text line captured
    // as text=<line>, or the trailing odd pair of a multi-extra log), expand that value across the
    // remaining 3 columns so it gets the full Details width. Keeps the outer column geometry
    // stable across filter toggles while never cramping solo values into 26%.
    var s = '<table class="props-table"><colgroup>' +
      '<col class="col-k" /><col class="col-v" /><col class="col-k" /><col class="col-v" />' +
      "</colgroup><tbody>";
    for (var i = 0; i < extras.length; i += 2) {
      s += "<tr>";
      s += '<td class="prop-name">' + escapeHtml(extras[i].k) + "</td>";
      if (i + 1 < extras.length) {
        s += '<td class="prop-val">' + escapeHtml(extras[i].v) + "</td>";
        s += '<td class="prop-name">' + escapeHtml(extras[i + 1].k) + "</td>";
        s += '<td class="prop-val">' + escapeHtml(extras[i + 1].v) + "</td>";
      } else {
        s += '<td class="prop-val prop-val-wide" colspan="3">' + escapeHtml(extras[i].v) + "</td>";
      }
      s += "</tr>";
    }
    s += "</tbody></table>";
    return s;
  }

  function syncPollMeta(data) {
    if (!data) return;
    if (data.buffer_min_seq != null) bufferMinSeqFromServer = data.buffer_min_seq;
  }

  function prependHistoricalEntries(entriesOldestFirst) {
    if (!entriesOldestFirst || !entriesOldestFirst.length) return;
    var roll = [];
    for (var i = 0; i < entriesOldestFirst.length; i++) {
      var e = entriesOldestFirst[i];
      if (!e || !e.seq || seenSeq[e.seq]) continue;
      seenSeq[e.seq] = true;
      roll.push({
        seq: e.seq,
        source: e.source,
        text: e.text || "",
        ts: e.ts,
        parsed: parseLogText(e.source, e.text || "", e.ts)
      });
    }
    if (!roll.length) return;
    var prevH = document.documentElement.scrollHeight;
    var prevTop = window.scrollY;
    entryCache = roll.concat(entryCache);
    while (entryCache.length > CLIENT_CACHE_MAX) {
      var gone = entryCache.shift();
      if (gone && gone.seq) delete seenSeq[gone.seq];
    }
    minLoadedSeq = entryCache.length ? entryCache[0].seq : minLoadedSeq;
    if (viewMode === "summarized") {
      scheduleStoryRebuild();
    } else if (viewMode === "raw") {
      rebuildAllRows();
      window.requestAnimationFrame(function () {
        var dh = document.documentElement.scrollHeight - prevH;
        window.scrollTo(0, prevTop + dh);
      });
    } else if (viewMode === "raw_logs") {
      var ta = document.getElementById("raw-logs-textarea");
      var prevTaTop = ta ? ta.scrollTop : 0;
      var prevTaScrollH = ta ? ta.scrollHeight : 0;
      rebuildRawLogsTextarea({ scrollBottom: false });
      if (ta) {
        window.requestAnimationFrame(function () {
          ta.scrollTop = prevTaTop + (ta.scrollHeight - prevTaScrollH);
        });
      }
    }
    applyFilters();
  }

  function fetchOlderLogs() {
    if (olderFetchBusy) return;
    if (viewMode === "summarized") return;
    if (!minLoadedSeq || !bufferMinSeqFromServer) return;
    if (minLoadedSeq <= bufferMinSeqFromServer) return;
    olderFetchBusy = true;
    var prevStatus = statusEl ? statusEl.textContent : "";
    if (statusEl) statusEl.textContent = "Loading older…";
    fetch(
      "/api/ui/logs?before_seq=" +
        encodeURIComponent(String(minLoadedSeq)) +
        "&limit=" +
        BACKFILL_CHUNK,
      { credentials: "same-origin" }
    )
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        syncPollMeta(data);
        prependHistoricalEntries(data.lines || []);
        olderFetchBusy = false;
        if (statusEl) statusEl.textContent = prevStatus.indexOf("Live") >= 0 ? prevStatus : "Live (SSE)";
      })
      .catch(function () {
        olderFetchBusy = false;
        if (statusEl) statusEl.textContent = prevStatus;
      });
  }

  function onWindowScrollMaybeOlder() {
    if (window.scrollY > 260) return;
    fetchOlderLogs();
  }

  function onRawTextareaScroll(ev) {
    if (viewMode !== "raw_logs") return;
    var ta = ev.target;
    if (!ta || ta.scrollTop > 160) return;
    fetchOlderLogs();
  }

  function appendLine(e) {
    if (!e || e.seq == null) return;
    var sq = Number(e.seq);
    if (!sq || seenSeq[sq]) return;
    seenSeq[sq] = true;
    maxSeq = Math.max(maxSeq, sq);
    var follow = nearBottom();
    var parsed = parseLogText(e.source, e.text || "", e.ts);
    entryCache.push({
      seq: e.seq,
      source: e.source,
      text: e.text || "",
      ts: e.ts,
      parsed: parsed
    });
    var cacheTrimmed = false;
    while (entryCache.length > CLIENT_CACHE_MAX) {
      var gone = entryCache.shift();
      if (gone && gone.seq) delete seenSeq[gone.seq];
      cacheTrimmed = true;
    }

    if (viewMode === "summarized") {
      scheduleStoryRebuild();
      if (follow) window.scrollTo(0, document.documentElement.scrollHeight);
      return;
    }
    if (viewMode === "raw_logs") {
      ensureAppOption(parsed.app);
      if (parsed.levelCanon) ensureLevelOption(parsed.levelCanon);
      var ta0 = document.getElementById("raw-logs-textarea");
      if (cacheTrimmed) {
        rebuildRawLogsTextarea({ scrollBottom: nearBottomTextarea(ta0) });
        return;
      }
      var followTa = nearBottomTextarea(ta0);
      if (entryMatchesFilters(parsed)) {
        appendRawLineToTextarea(
          { seq: e.seq, text: e.text, ts: e.ts, source: e.source, parsed: parsed },
          followTa
        );
      }
      return;
    }
    ensureAppOption(parsed.app);
    if (parsed.levelCanon) ensureLevelOption(parsed.levelCanon);
    appendTableRow(parsed, follow, e.seq, e.ts, e.text);
  }

  function applyPollPayload(data, opts) {
    opts = opts || {};
    syncPollMeta(data);
    var lines = data.lines || [];
    for (var i = 0; i < lines.length; i++) {
      appendLine(lines[i]);
    }
    if (opts.rawPrimeScroll && lines.length && (viewMode === "raw" || viewMode === "raw_logs")) {
      window.requestAnimationFrame(function () {
        if (viewMode === "raw") {
          window.scrollTo(0, document.documentElement.scrollHeight);
        } else {
          var ta = document.getElementById("raw-logs-textarea");
          if (ta) ta.scrollTop = ta.scrollHeight;
        }
      });
    }
    return data.max_seq || maxSeq;
  }

  function applyPollPayloadBatched(data, opts, startIdx, doneFn) {
    opts = opts || {};
    syncPollMeta(data);
    var lines = data.lines || [];
    var i = startIdx || 0;
    var end = Math.min(i + RENDER_CHUNK, lines.length);
    for (; i < end; i++) {
      appendLine(lines[i]);
    }
    if (end < lines.length) {
      if (statusEl) statusEl.textContent = "Rendering… " + end + "/" + lines.length;
      window.requestAnimationFrame(function () {
        applyPollPayloadBatched(data, opts, end, doneFn);
      });
      return;
    }
    if (lines.length) minLoadedSeq = lines[0].seq;
    if (opts.rawPrimeScroll && lines.length && (viewMode === "raw" || viewMode === "raw_logs")) {
      window.requestAnimationFrame(function () {
        if (viewMode === "raw") {
          window.scrollTo(0, document.documentElement.scrollHeight);
        } else {
          var ta = document.getElementById("raw-logs-textarea");
          if (ta) ta.scrollTop = ta.scrollHeight;
        }
      });
    }
    if (doneFn) doneFn();
  }

  function flushSSEPending() {
    sseFlushScheduled = false;
    var batch = ssePending.splice(0, 120);
    for (var bi = 0; bi < batch.length; bi++) {
      appendLine(batch[bi]);
    }
    if (ssePending.length) {
      sseFlushScheduled = true;
      window.requestAnimationFrame(flushSSEPending);
    }
  }

  function queueSSELine(row) {
    ssePending.push(row);
    if (!sseFlushScheduled) {
      sseFlushScheduled = true;
      window.requestAnimationFrame(flushSSEPending);
    }
  }

  function pollOnce() {
    fetch("/api/ui/logs?since=" + maxSeq, { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayload(data);
        if (statusEl) {
          statusEl.textContent = "Live (poll)";
          statusEl.className = "";
        }
      })
      .catch(function () {
        if (statusEl) {
          statusEl.textContent = "Log API error — check session";
          statusEl.className = "err";
        }
      });
  }

  function stopPolling() {
    if (pollTimer) {
      try {
        clearInterval(pollTimer);
      } catch (x) {}
      pollTimer = null;
    }
  }

  function startPolling() {
    if (pollTimer) return;
    if (es) {
      try { es.close(); } catch (x) {}
      es = null;
    }
    pollOnce();
    pollTimer = setInterval(pollOnce, 1500);
  }

  function startEventSource() {
    stopPolling();
    if (es) return;
    var url = "/api/ui/logs/stream";
    try {
      es = new EventSource(url, { withCredentials: true });
    } catch (x) {
      es = new EventSource(url);
    }
    /* Do not key off status text ("Loading history…" has no "Live"); rely on readyState.
       Local EventSource can take >2.5s to reach OPEN (webview / busy main thread). */
    var sseFailed = window.setTimeout(function () {
      if (es && es.readyState === EventSource.OPEN) return;
      startPolling();
    }, 12000);
    es.onopen = function () {
      window.clearTimeout(sseFailed);
      stopPolling();
      if (statusEl) {
        statusEl.textContent = "Live (SSE)";
        statusEl.className = "";
      }
    };
    es.onerror = function () {
      window.clearTimeout(sseFailed);
      if (es && es.readyState === EventSource.CLOSED) {
        startPolling();
      } else {
        if (statusEl) {
          statusEl.textContent = "SSE reconnecting…";
          statusEl.className = "err";
        }
        window.setTimeout(function () {
          if (es && es.readyState !== EventSource.OPEN) {
            startPolling();
          }
        }, 2000);
      }
    };
    es.onmessage = function (ev) {
      try {
        queueSSELine(JSON.parse(ev.data));
      } catch (x) {
        if (statusEl) {
          statusEl.textContent = "Bad frame";
          statusEl.className = "err";
        }
      }
    };
  }

  function startStreaming() {
    if (started) return;
    started = true;
    if (statusEl) statusEl.textContent = "Loading history…";
    /* Latest-first tail; rest via scroll-up backfill. Align INITIAL_TAIL_LIMIT with cold-load UX. */
    fetch("/api/ui/logs?since=0&limit=" + INITIAL_TAIL_LIMIT, { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayloadBatched(data, { rawPrimeScroll: true }, 0, function () {
          fetchTokenLabels();
          startEventSource();
        });
      })
      .catch(function () {
        if (statusEl) {
          statusEl.textContent = "Unauthorized — sign in from the shell";
          statusEl.className = "err";
        }
      });
  }

  if (embedded) {
    window.addEventListener("message", function (ev) {
      if (ev.origin !== window.location.origin) return;
      var d = ev.data;
      if (d && d.type === "claudia-logs-activate") {
        if (d.view) {
          viewMode = normalizeViewMode(String(d.view));
          saveViewMode(viewMode);
          syncViewSelects();
          applyViewLayout();
          rebuildAllRows();
        }
        startStreaming();
      }
    });
    if (statusEl) statusEl.textContent = "Open the Logs tab…";
    setTimeout(function () {
      if (!started) startStreaming();
    }, 4000);
  } else {
    startStreaming();
  }
  window.addEventListener("scroll", onWindowScrollMaybeOlder, { passive: true });
  var rawTaAttach = document.getElementById("raw-logs-textarea");
  if (rawTaAttach) rawTaAttach.addEventListener("scroll", onRawTextareaScroll, { passive: true });

  fetchTokenLabels();
  applyViewLayout();
})();
  </script>
</body>
</html>
