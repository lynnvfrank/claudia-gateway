<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Claudia — Logs</title>
  <style>
    body { font-family: ui-monospace, monospace; margin: 0; padding: 0.75rem; background: #1a1a1a; color: #e8e8e8; min-height: 100vh; box-sizing: border-box; }
    #toolbar { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    #toolbar a { color: #7cb8ff; }
    #toolbar .hint { font-size: 0.75rem; color: #888; }
    #status { font-size: 0.75rem; color: #888; }
    #out { white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; line-height: 1.35; margin: 0; }
    .line { border-bottom: 1px solid #2a2a2a; padding: 0.15rem 0; }
    .src { color: #9cdcfe; margin-right: 0.5rem; }
    .err { color: #f88; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="toolbar-extra"></span>
    <span id="status">Starting…</span>
  </div>
  <pre id="out"></pre>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var embedded = params.get("embed") === "1" || window.self !== window.top;
  var out = document.getElementById("out");
  var statusEl = document.getElementById("status");
  var extra = document.getElementById("toolbar-extra");
  if (embedded) {
    extra.innerHTML = '<span class="hint">Embedded in desktop shell — switch views with the tabs above.</span>';
  } else {
    extra.innerHTML = '<a href="/ui/desktop" target="_top">Desktop shell</a> · <a href="/ui/panel" target="_top">Admin</a>';
  }

  var maxSeq = 0;
  var stickPx = 120;
  var es = null;
  var pollTimer = null;
  var started = false;

  function nearBottom() {
    var el = document.documentElement;
    var sh = el.scrollHeight;
    var y = window.scrollY + window.innerHeight;
    return sh - y <= stickPx;
  }
  function appendLine(e) {
    if (e.seq <= maxSeq) return;
    maxSeq = e.seq;
    var follow = nearBottom();
    var row = document.createElement("div");
    row.className = "line";
    var ts = (e.ts && e.ts.replace("T", " ").replace("Z", "")) || "";
    row.innerHTML = '<span class="src">[' + escapeHtml(e.source) + "]</span> " +
      '<span class="ts">' + escapeHtml(ts) + "</span> " + escapeHtml(e.text);
    out.appendChild(row);
    while (out.children.length > 5000) {
      var first = out.firstChild;
      var removedH = first.offsetHeight;
      out.removeChild(first);
      if (!follow && removedH) {
        window.scrollTo(0, Math.max(0, window.scrollY - removedH));
      }
    }
    if (follow) {
      window.scrollTo(0, document.documentElement.scrollHeight);
    }
  }
  function escapeHtml(s) {
    if (!s) return "";
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function applyPollPayload(data) {
    var lines = data.lines || [];
    for (var i = 0; i < lines.length; i++) {
      appendLine(lines[i]);
    }
    return data.max_seq || maxSeq;
  }

  function pollOnce() {
    fetch("/api/ui/logs?since=" + maxSeq, { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayload(data);
        statusEl.textContent = "Live (poll)";
        statusEl.className = "";
      })
      .catch(function () {
        statusEl.textContent = "Log API error — check session";
        statusEl.className = "err";
      });
  }

  function startPolling() {
    if (pollTimer) return;
    if (es) {
      try { es.close(); } catch (x) {}
      es = null;
    }
    pollOnce();
    pollTimer = setInterval(pollOnce, 1500);
  }

  function startEventSource() {
    if (es) return;
    var url = "/api/ui/logs/stream";
    try {
      es = new EventSource(url, { withCredentials: true });
    } catch (x) {
      es = new EventSource(url);
    }
    var sseFailed = window.setTimeout(function () {
      if (statusEl.textContent.indexOf("Live") === -1) {
        startPolling();
      }
    }, 2500);
    es.onopen = function () {
      window.clearTimeout(sseFailed);
      statusEl.textContent = "Live (SSE)";
      statusEl.className = "";
    };
    es.onerror = function () {
      window.clearTimeout(sseFailed);
      if (es && es.readyState === EventSource.CLOSED) {
        startPolling();
      } else {
        statusEl.textContent = "SSE reconnecting…";
        statusEl.className = "err";
        window.setTimeout(function () {
          if (es && es.readyState !== EventSource.OPEN) {
            startPolling();
          }
        }, 2000);
      }
    };
    es.onmessage = function (ev) {
      try {
        var e = JSON.parse(ev.data);
        appendLine(e);
      } catch (x) {
        statusEl.textContent = "Bad frame";
        statusEl.className = "err";
      }
    };
  }

  function startStreaming() {
    if (started) return;
    started = true;
    statusEl.textContent = "Loading history…";
    fetch("/api/ui/logs?since=0", { credentials: "same-origin" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        applyPollPayload(data);
        startEventSource();
      })
      .catch(function () {
        statusEl.textContent = "Unauthorized — sign in from the shell";
        statusEl.className = "err";
      });
  }

  if (embedded) {
    window.addEventListener("message", function (ev) {
      if (ev.origin !== window.location.origin) return;
      var d = ev.data;
      if (d && d.type === "claudia-logs-activate") {
        startStreaming();
      }
    });
    statusEl.textContent = "Open the Logs tab…";
    /* Fallback if shell message is missed (e.g. older cache) */
    setTimeout(function () {
      if (!started) startStreaming();
    }, 4000);
  } else {
    startStreaming();
  }
})();
  </script>
</body>
</html>
